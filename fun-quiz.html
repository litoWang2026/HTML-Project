<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Quiz</title>
  <style>
    :root {
      --bg1: #1f1147;
      --bg2: #14396c;
      --bg3: #0f6b6c;
      --text: #eef8ff;
      --muted: #c5dded;
      --panel: rgba(255, 255, 255, 0.1);
      --border: rgba(255, 255, 255, 0.24);
      --accent: #ffca66;
      --accent2: #5ce1e6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: "Trebuchet MS", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 20%, #ffca6630, transparent 30%),
        radial-gradient(circle at 85% 15%, #5ce1e644, transparent 32%),
        linear-gradient(140deg, var(--bg1), var(--bg2), var(--bg3));
      display: grid;
      place-items: center;
      padding: 1rem;
    }

    .wrap {
      width: min(860px, 100%);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 22px;
      backdrop-filter: blur(10px);
      padding: 1.3rem 1.4rem 1.8rem;
      box-shadow: 0 18px 44px rgba(0, 0, 0, 0.35);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.8rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }

    .actions {
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 0.65rem 0.95rem;
      font-weight: 700;
      cursor: pointer;
    }

    .lang-btn {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 999px;
    }

    .primary {
      background: linear-gradient(90deg, var(--accent), #ffe2a8);
      color: #3b2500;
    }

    .secondary {
      background: linear-gradient(90deg, var(--accent2), #9deef1);
      color: #03353a;
    }

    h1 {
      font-size: clamp(1.5rem, 4vw, 2.4rem);
      margin-bottom: 0.5rem;
    }

    .desc {
      color: var(--muted);
      margin-bottom: 1.3rem;
    }

    .question {
      font-size: clamp(1.1rem, 3vw, 1.35rem);
      font-weight: 700;
      margin-bottom: 0.9rem;
    }

    .options {
      display: grid;
      gap: 0.7rem;
      margin-bottom: 1rem;
    }

    .option {
      text-align: left;
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.05);
      color: var(--text);
      padding: 0.85rem;
    }

    .option:hover {
      background: rgba(255, 255, 255, 0.14);
    }

    .meta {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 0.8rem;
      color: var(--muted);
      font-weight: 700;
      margin-bottom: 1rem;
    }

    .result {
      border: 1px solid var(--border);
      background: rgba(255, 255, 255, 0.06);
      border-radius: 12px;
      padding: 0.85rem;
      min-height: 52px;
      color: #fff8de;
      font-weight: 700;
    }

    .board {
      margin-top: 1rem;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.9rem;
      background: rgba(255, 255, 255, 0.05);
    }

    .board h2 {
      font-size: 1.05rem;
      margin-bottom: 0.6rem;
    }

    .board-item {
      display: flex;
      justify-content: space-between;
      gap: 0.6rem;
      padding: 0.45rem 0;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.15);
      color: var(--muted);
      font-weight: 700;
      font-size: 0.92rem;
    }

    .board-item:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <div class="top">
      <div class="actions">
        <button class="lang-btn" id="langToggle">EN</button>
        <button class="secondary" onclick="window.location.href='index.html'" data-i18n="home">返回主页</button>
        <button class="secondary" onclick="window.location.href='reflex-game.html'" data-i18n="nextGame">反应力挑战</button>
      </div>
      <button class="primary" id="restartBtn" data-i18n="restart">重新开始</button>
    </div>

    <h1 data-i18n="title">趣味问答</h1>
    <p class="desc" data-i18n="desc">连续回答 5 个问题，看看你是否是 WLT 超级玩家。</p>

    <div class="meta">
      <div><span data-i18n="progress">进度</span>: <span id="progress">1/5</span></div>
      <div><span data-i18n="score">得分</span>: <span id="score">0</span></div>
    </div>

    <div class="question" id="question"></div>
    <div class="options" id="options"></div>
    <div class="result" id="result"></div>

    <section class="board">
      <h2 data-i18n="leaderboard">排行榜</h2>
      <div id="leaderboardList"></div>
    </section>
  </main>

  <script>
    const langToggle = document.getElementById('langToggle');
    const questionEl = document.getElementById('question');
    const optionsEl = document.getElementById('options');
    const progressEl = document.getElementById('progress');
    const scoreEl = document.getElementById('score');
    const resultEl = document.getElementById('result');
    const restartBtn = document.getElementById('restartBtn');
    const leaderboardListEl = document.getElementById('leaderboardList');

    let lang = localStorage.getItem('wltLang') || 'zh';
    let idx = 0;
    let score = 0;
    let finished = false;

    const ui = {
      zh: {
        home: '返回主页',
        nextGame: '反应力挑战',
        restart: '重新开始',
        title: '趣味问答',
        desc: '连续回答 5 个问题，看看你是否是 WLT 超级玩家。',
        progress: '进度',
        score: '得分',
        correct: '回答正确',
        wrong: '回答错误',
        done: '完成啦！你的最终得分：',
        leaderboard: '排行榜',
        noRecord: '暂无记录，快来挑战一次。',
        quizGame: '问答'
      },
      en: {
        home: 'Back Home',
        nextGame: 'Reflex Challenge',
        restart: 'Restart',
        title: 'Fun Quiz',
        desc: 'Answer 5 questions in a row and see if you are a WLT super player.',
        progress: 'Progress',
        score: 'Score',
        correct: 'Correct answer',
        wrong: 'Wrong answer',
        done: 'Done! Your final score: ',
        leaderboard: 'Leaderboard',
        noRecord: 'No records yet. Play one round first.',
        quizGame: 'Quiz'
      }
    };

    const leaderboardKey = 'wltLeaderboard';

    function getLeaderboard() {
      const raw = localStorage.getItem(leaderboardKey);
      if (!raw) {
        return [];
      }
      try {
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveQuizRecord(finalScore, total) {
      const board = getLeaderboard();
      board.push({
        game: 'quiz',
        value: finalScore,
        detail: `${finalScore}/${total}`,
        ts: Date.now()
      });
      localStorage.setItem(leaderboardKey, JSON.stringify(board.slice(-15)));
    }

    function renderLeaderboard() {
      const board = getLeaderboard().slice(-5).reverse();
      if (board.length === 0) {
        leaderboardListEl.innerHTML = `<div class="board-item">${ui[lang].noRecord}</div>`;
        return;
      }
      leaderboardListEl.innerHTML = board.map((item, index) => {
        const gameText = item.game === 'quiz' ? ui[lang].quizGame : 'Reflex';
        return `<div class="board-item"><span>#${index + 1} ${gameText}</span><span>${item.detail}</span></div>`;
      }).join('');
    }

    const questions = {
      zh: [
        { q: 'HTML 中用于最大标题的标签是？', o: ['<h1>', '<title>', '<header>', '<p>'], a: 0 },
        { q: 'JavaScript 用于声明常量的关键字是？', o: ['let', 'const', 'var', 'static'], a: 1 },
        { q: 'CSS 中设置文字颜色的属性是？', o: ['font-color', 'text-style', 'color', 'text-color'], a: 2 },
        { q: '哪个方法可以把字符串转换成数字？', o: ['String()', 'toFixed()', 'Number()', 'parseCSS()'], a: 2 },
        { q: 'localStorage 的数据在刷新后会？', o: ['消失', '保留', '随机变化', '变成数组'], a: 1 }
      ],
      en: [
        { q: 'Which HTML tag is used for the largest heading?', o: ['<h1>', '<title>', '<header>', '<p>'], a: 0 },
        { q: 'Which keyword declares a constant in JavaScript?', o: ['let', 'const', 'var', 'static'], a: 1 },
        { q: 'Which CSS property sets text color?', o: ['font-color', 'text-style', 'color', 'text-color'], a: 2 },
        { q: 'Which method can convert a value to a number?', o: ['String()', 'toFixed()', 'Number()', 'parseCSS()'], a: 2 },
        { q: 'What happens to localStorage data after refresh?', o: ['It disappears', 'It stays', 'It changes randomly', 'It becomes an array'], a: 1 }
      ]
    };

    function applyLanguage() {
      document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
      document.querySelectorAll('[data-i18n]').forEach((el) => {
        const key = el.dataset.i18n;
        if (ui[lang][key]) {
          el.textContent = ui[lang][key];
        }
      });
      langToggle.textContent = lang === 'zh' ? 'EN' : '中';
      renderLeaderboard();
    }

    function renderQuestion() {
      const set = questions[lang];
      if (idx >= set.length) {
        questionEl.textContent = ui[lang].done + score;
        optionsEl.innerHTML = '';
        progressEl.textContent = `${set.length}/${set.length}`;
        resultEl.textContent = ui[lang].done + score;
        if (!finished) {
          finished = true;
          saveQuizRecord(score, set.length);
          renderLeaderboard();
        }
        return;
      }

      const item = set[idx];
      questionEl.textContent = item.q;
      optionsEl.innerHTML = '';
      progressEl.textContent = `${idx + 1}/${set.length}`;
      scoreEl.textContent = String(score);

      item.o.forEach((text, optionIdx) => {
        const btn = document.createElement('button');
        btn.className = 'option';
        btn.textContent = text;
        btn.addEventListener('click', () => {
          if (optionIdx === item.a) {
            score += 1;
            resultEl.textContent = ui[lang].correct;
          } else {
            resultEl.textContent = ui[lang].wrong;
          }
          idx += 1;
          scoreEl.textContent = String(score);
          setTimeout(renderQuestion, 280);
        });
        optionsEl.appendChild(btn);
      });
    }

    function restartGame() {
      idx = 0;
      score = 0;
      finished = false;
      scoreEl.textContent = '0';
      resultEl.textContent = '';
      renderQuestion();
    }

    langToggle.addEventListener('click', () => {
      lang = lang === 'zh' ? 'en' : 'zh';
      localStorage.setItem('wltLang', lang);
      applyLanguage();
      restartGame();
    });

    restartBtn.addEventListener('click', restartGame);

    applyLanguage();
    restartGame();
  </script>
</body>
</html>
